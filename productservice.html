<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products - Digital Store</title>


<style>

:root{

--bg:#080716;
--panel:#14122b;
--violet:#7c5cff;
--pink:#ff4fd8;
--cyan:#3ee6e0;
--text:#aaa5c9;

}


*{

box-sizing:border-box;
font-family:"Segoe UI",Arial;

}



body{

margin:0;

background:
radial-gradient(circle at top,#29145e,transparent 40%),
var(--bg);

color:white;

}



/* HEADER */


header{

height:70px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 25px;

background:#14122bee;

position:sticky;

top:0;

z-index:10;

}



.logo{

font-size:25px;

font-weight:900;

background:
linear-gradient(90deg,var(--violet),var(--pink),var(--cyan));

-webkit-background-clip:text;

color:transparent;

}



.back{

text-decoration:none;

color:white;

padding:10px 20px;

border-radius:20px;

background:linear-gradient(
90deg,
var(--violet),
var(--pink)
);

}




/* HERO */


.hero{

text-align:center;

padding:70px 20px;

}



.hero h1{

font-size:45px;

background:
linear-gradient(90deg,#fff,var(--cyan),var(--pink));

-webkit-background-clip:text;

color:transparent;

}



.hero p{

color:var(--text);

}





/* SEARCH */


.search{

text-align:center;

padding:20px;

}



.search input{

width:300px;

max-width:90%;

padding:15px;

border-radius:30px;

border:none;

outline:none;

}




/* PRODUCTS */


.products{

display:flex;

justify-content:center;

gap:25px;

padding:40px 20px;

flex-wrap:wrap;

}



.card{

width:300px;

background:var(--panel);

padding:25px;

border-radius:20px;

box-shadow:
0 20px 50px black;

transition:.3s;

}



.card:hover{

transform:translateY(-8px);

}



.badge{

display:inline-block;

background:#ffb84f;

color:black;

padding:5px 12px;

border-radius:10px;

font-size:12px;

font-weight:bold;

}



.card h2{

margin-top:20px;

}



.desc{

color:var(--text);

}



.price{

font-size:38px;

font-weight:900;

color:var(--cyan);

}



.stock{

color:#6cff9c;

}




button{

width:100%;

padding:14px;

border:0;

border-radius:12px;

background:

linear-gradient(
90deg,
var(--violet),
var(--pink)
);

color:white;

font-weight:bold;

cursor:pointer;

}



button:hover{

filter:brightness(1.2);

}




footer{

padding:30px;

text-align:center;

color:var(--text);

}



@media(max-width:600px){


.hero h1{

font-size:32px;

}


.card{

width:90%;

}


}



</style>

</head>


<body>




<header>


<div class="logo">

Digital Store

</div>


<a class="back" href="index.html">

Home

</a>


</header>







<section class="hero">


<h1>

Choose Your Subscription

</h1>


<p>

Select a plan and get premium access.

</p>


</section>







<div class="search">


<input 
id="search"
placeholder="Search products..."
onkeyup="searchProducts()">


</div>






<div class="products" id="products">


</div>







<footer>

© 2026 Digital Store

</footer>








<script>



let products=[


{

name:"AI Premium",

price:499,

duration:"30 Days",

stock:20,

description:"Premium AI tools access",

badge:"BEST SELLER"

},



{

name:"Gaming Plan",

price:299,

duration:"30 Days",

stock:50,

description:"Gaming premium subscription",

badge:"POPULAR"

},




{

name:"Cloud Storage Pro",

price:199,

duration:"12 Months",

stock:35,

description:"1TB Cloud Storage",

badge:"NEW"

}


];







function loadProducts(data=products){


let box=document.getElementById("products");


box.innerHTML="";



data.forEach(product=>{


box.innerHTML += `


<div class="card">


<span class="badge">

${product.badge}

</span>


<h2>

${product.name}

</h2>


<p class="desc">

${product.description}

</p>



<div class="price">

₹${product.price}

</div>



<p>

Duration:
${product.duration}

</p>



<p class="stock">

Available:
${product.stock}

</p>



<button onclick="buy('${product.name}')">

Buy Now

</button>


</div>


`;

});


}






function searchProducts(){


let value=
document.getElementById("search").value.toLowerCase();



let result =
products.filter(p=>

p.name.toLowerCase().includes(value)

);



loadProducts(result);


}






function buy(product){


alert(
"Selected: "+product+
"\nPayment page will open here"
);


// Later connect Firebase order system


}






loadProducts();



</script>



</body>

</html>
