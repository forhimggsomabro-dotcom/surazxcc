<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAZXX Admin Products</title>


<style>

:root{

--bg:#faf7ef;
--gold:#d8ad32;
--gold2:#f0ce65;
--card:#fff;
--border:#eadbb8;
--text:#17130d;

}


*{
box-sizing:border-box;
font-family:Segoe UI,Arial;
}


body{

margin:0;

background:var(--bg);

color:var(--text);

}


/* HEADER */

header{

height:80px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 40px;

background:white;

border-bottom:1px solid var(--border);

}



.logo{

font-size:28px;

font-weight:900;

color:var(--gold);

}



.back{

text-decoration:none;

background:var(--gold);

color:black;

padding:12px 25px;

border-radius:30px;

font-weight:bold;

}




.container{

padding:40px;

}





.box{

background:white;

padding:30px;

border-radius:25px;

border:1px solid var(--border);

margin-bottom:30px;

}



h2{

margin-top:0;

}





input,textarea,select{

width:100%;

padding:14px;

margin:10px 0;

border-radius:12px;

border:1px solid var(--border);

font-size:15px;

}




button{

padding:13px 25px;

border:none;

border-radius:25px;

background:var(--gold);

font-weight:bold;

cursor:pointer;

}



.delete{

background:#ff5555;

color:white;

}



.edit{

background:#17130d;

color:white;

}





.products{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(260px,1fr));

gap:25px;

}



.product{

background:#fff;

border:1px solid var(--border);

padding:25px;

border-radius:25px;

}



.product img{

width:80px;

height:80px;

border-radius:15px;

object-fit:cover;

}




.price{

font-size:30px;

font-weight:bold;

color:var(--gold);

}



.actions{

display:flex;

gap:10px;

margin-top:20px;

}




@media(max-width:600px){

.container{

padding:20px;

}

header{

padding:0 20px;

}

}


</style>

</head>


<body>



<header>


<div class="logo">

PANKAZXX PRODUCTS

</div>


<a class="back" href="dashboard.html">

Dashboard

</a>


</header>







<div class="container">



<div class="box">


<h2>

Add Product

</h2>



<input id="name"
placeholder="Product Name">



<input id="category"
placeholder="Category (AI, Gaming...)">



<input id="price"
placeholder="Price">



<input id="duration"
placeholder="Duration">



<input id="stock"
placeholder="Stock">



<input id="image"
placeholder="Image URL">



<textarea id="description"
placeholder="Description"></textarea>



<button onclick="saveProduct()">

Add Product

</button>



</div>







<div class="box">


<h2>

All Products

</h2>



<div class="products" id="productList">


</div>



</div>



</div>







<script>


let products = 
JSON.parse(
localStorage.getItem("products")
)
||
[];




let editIndex = -1;





function saveProduct(){



let product={


name:
document.getElementById("name").value,


category:
document.getElementById("category").value,


price:
document.getElementById("price").value,


duration:
document.getElementById("duration").value,


stock:
document.getElementById("stock").value,


image:
document.getElementById("image").value,


description:
document.getElementById("description").value



};





if(editIndex === -1)

{

products.push(product);

}

else

{

products[editIndex]=product;

editIndex=-1;

}





localStorage.setItem(

"products",

JSON.stringify(products)

);



clearForm();

showProducts();


}







function showProducts(){


let box =
document.getElementById("productList");


box.innerHTML="";



products.forEach((p,index)=>{


box.innerHTML += `


<div class="product">



<img src="${p.image || 'logo.png'}">



<h3>

${p.name}

</h3>



<p>

${p.category}

</p>


<div class="price">

₹${p.price}

</div>



<p>

Stock: ${p.stock}

</p>


<p>

${p.duration}

</p>



<div class="actions">


<button class="edit"
onclick="editProduct(${index})">

Edit

</button>


<button class="delete"
onclick="deleteProduct(${index})">

Delete

</button>


</div>



</div>


`;

});


}







function editProduct(index){


let p=products[index];


document.getElementById("name").value=p.name;

document.getElementById("category").value=p.category;

document.getElementById("price").value=p.price;

document.getElementById("duration").value=p.duration;

document.getElementById("stock").value=p.stock;

document.getElementById("image").value=p.image;

document.getElementById("description").value=p.description;


editIndex=index;


window.scrollTo(0,0);


}







function deleteProduct(index){


products.splice(index,1);


localStorage.setItem(

"products",

JSON.stringify(products)

);


showProducts();


}






function clearForm(){


document.querySelectorAll("input,textarea")
.forEach(e=>e.value="");


}







showProducts();



</script>


</body>

</html>
