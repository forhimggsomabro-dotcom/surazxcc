<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAZXX Orders</title>


<style>

:root{

--bg:#faf7ef;
--gold:#d8ad32;
--gold2:#f0ce65;
--card:#fff;
--border:#eadbb8;
--text:#17130d;

}


*{

box-sizing:border-box;
font-family:Segoe UI,Arial;

}



body{

margin:0;

background:var(--bg);

color:var(--text);

}



/* HEADER */

header{

height:80px;

background:white;

border-bottom:1px solid var(--border);

display:flex;

align-items:center;

justify-content:space-between;

padding:0 40px;

}



.logo{

font-size:28px;

font-weight:900;

color:var(--gold);

}



.back{

text-decoration:none;

background:var(--gold);

color:black;

padding:12px 25px;

border-radius:30px;

font-weight:bold;

}



/* MAIN */


.container{

padding:40px;

}



.box{

background:white;

padding:30px;

border-radius:25px;

border:1px solid var(--border);

}




.orders{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(300px,1fr));

gap:25px;

}





.order{

background:#fff;

padding:25px;

border-radius:20px;

border:1px solid var(--border);

}



.order h3{

margin-top:0;

}




.status{

padding:8px 15px;

border-radius:20px;

font-weight:bold;

display:inline-block;

}



.pending{

background:#fff1bd;

color:#8a6500;

}



.approved{

background:#c8ffd9;

color:#008b38;

}



.rejected{

background:#ffd0d0;

color:#b00000;

}





button{

padding:12px 20px;

border:none;

border-radius:20px;

cursor:pointer;

font-weight:bold;

margin:5px;

}



.approve{

background:#22c55e;

color:white;

}



.reject{

background:#ef4444;

color:white;

}





.payment{

width:100%;

height:180px;

object-fit:cover;

border-radius:15px;

margin-top:15px;

}





@media(max-width:600px){

.container{

padding:20px;

}

header{

padding:0 20px;

}

}



</style>


</head>


<body>



<header>


<div class="logo">

PANKAZXX ORDERS

</div>


<a class="back" href="dashboard.html">

Dashboard

</a>


</header>







<div class="container">


<div class="box">


<h2>

Customer Orders

</h2>



<div class="orders" id="orders">


</div>


</div>


</div>









<script>



let orders = 

JSON.parse(

localStorage.getItem("orders")

)

||

[


{

id:1001,

customer:"Demo User",

email:"user@gmail.com",

product:"ChatGPT Plus",

amount:"₹499",

status:"pending",

payment:""

}


];







function loadOrders(){



let box=document.getElementById("orders");


box.innerHTML="";



orders.forEach((order,index)=>{



let statusClass =

order.status;



box.innerHTML += `



<div class="order">


<h3>

Order #${order.id}

</h3>



<p>

<b>Customer:</b>

${order.customer}

</p>



<p>

<b>Email:</b>

${order.email}

</p>



<p>

<b>Product:</b>

${order.product}

</p>



<p>

<b>Amount:</b>

${order.amount}

</p>



<span class="status ${statusClass}">

${order.status}

</span>



${order.payment ? `

<img class="payment"

src="${order.payment}">

` : ""}



<br>



<button class="approve"

onclick="approve(${index})">

Approve

</button>




<button class="reject"

onclick="reject(${index})">

Reject

</button>



</div>



`;



});



}







function approve(index){


orders[index].status="approved";


save();


}







function reject(index){


orders[index].status="rejected";


save();


}







function save(){


localStorage.setItem(

"orders",

JSON.stringify(orders)

);


loadOrders();


}







loadOrders();



</script>


</body>

</html>
