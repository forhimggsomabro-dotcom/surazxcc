<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAZXX Settings</title>


<style>

:root{

--bg:#faf7ef;
--card:#fff;
--gold:#d8ad32;
--gold2:#f0ce65;
--border:#eadbb8;
--text:#17130d;

}


*{

box-sizing:border-box;
font-family:Segoe UI,Arial;

}


body{

margin:0;

background:var(--bg);

color:var(--text);

}


/* HEADER */


header{

height:85px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 40px;

background:white;

border-bottom:1px solid var(--border);

}



.logo{

font-size:28px;

font-weight:900;

color:var(--gold);

}



.back{

background:var(--gold);

color:black;

text-decoration:none;

padding:12px 25px;

border-radius:30px;

font-weight:bold;

}




.container{

padding:40px;

}



.box{

background:white;

max-width:750px;

padding:35px;

border-radius:25px;

border:1px solid var(--border);

}



h2{

margin-top:0;

}



label{

font-weight:bold;

}



input,textarea{

width:100%;

padding:15px;

margin:10px 0 20px;

border-radius:12px;

border:1px solid var(--border);

font-size:15px;

}



textarea{

height:130px;

resize:none;

}



button{

background:var(--gold);

border:none;

padding:15px 35px;

border-radius:30px;

font-weight:bold;

cursor:pointer;

}





.preview{

margin-top:30px;

background:#17130d;

color:white;

padding:25px;

border-radius:25px;

}



.preview img{

width:80px;

height:80px;

object-fit:cover;

border-radius:15px;

}





@media(max-width:600px){

.container{

padding:20px;

}


header{

padding:0 20px;

}


}


</style>

</head>


<body>



<header>


<div class="logo">

PANKAZXX SETTINGS

</div>


<a class="back" href="dashboard.html">

Dashboard

</a>


</header>







<div class="container">



<div class="box">


<h2>

Website Settings

</h2>




<label>

Store Name

</label>


<input id="storeName"
placeholder="PANKAZXX SHOP">





<label>

Logo URL

</label>


<input id="logo"
placeholder="logo.png">





<label>

Hero Title

</label>


<input id="title"
placeholder="Premium subs & accounts. Fast, cheap, real.">






<label>

Website Description

</label>


<textarea id="description"
placeholder="Browse premium digital subscriptions..."></textarea>






<label>

WhatsApp Link

</label>


<input id="whatsapp"
placeholder="https://wa.me/xxxxxxxx">






<label>

Telegram Support

</label>


<input id="telegram"
placeholder="@PANKAZXX_support">





<label>

Theme Color

</label>


<input id="color"
type="color"
value="#d8ad32">





<button onclick="saveSettings()">

Save Changes

</button>




</div>









<div class="preview">


<h2>

Preview

</h2>


<img id="previewLogo" src="logo.png">


<h2 id="previewName">

PANKAZXX SHOP

</h2>


<p id="previewTitle">

Premium digital access

</p>



</div>







</div>









<script>


// Login check

if(localStorage.getItem("adminLogin") !== "true"){

window.location.href="admin.html";

}






let settings = JSON.parse(

localStorage.getItem("settings")

)

|| {};






function saveSettings(){



settings={


storeName:

document.getElementById("storeName").value,


logo:

document.getElementById("logo").value,


title:

document.getElementById("title").value,


description:

document.getElementById("description").value,


whatsapp:

document.getElementById("whatsapp").value,


telegram:

document.getElementById("telegram").value,


color:

document.getElementById("color").value


};




localStorage.setItem(

"settings",

JSON.stringify(settings)

);



updatePreview();



alert("Settings Saved");



}







function updatePreview(){


document.getElementById("previewName")
.innerHTML =

settings.storeName || "PANKAZXX SHOP";



document.getElementById("previewTitle")
.innerHTML =

settings.title || "Premium digital access";



if(settings.logo){

document.getElementById("previewLogo")
.src=settings.logo;

}


}








function loadSettings(){



document.getElementById("storeName").value=

settings.storeName || "";



document.getElementById("logo").value=

settings.logo || "";



document.getElementById("title").value=

settings.title || "";



document.getElementById("description").value=

settings.description || "";



document.getElementById("whatsapp").value=

settings.whatsapp || "";



document.getElementById("telegram").value=

settings.telegram || "";



}



loadSettings();

updatePreview();



</script>


</body>

</html>
