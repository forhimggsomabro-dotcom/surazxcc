<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAZXX SHOP - Checkout</title>


<style>

:root{

--bg:#faf7ef;
--gold:#d8ad32;
--gold2:#f0ce65;
--border:#eadbb8;
--text:#17130d;

}


*{

box-sizing:border-box;
font-family:Segoe UI,Arial;

}



body{

margin:0;

background:var(--bg);

color:var(--text);

}




header{

height:85px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 60px;

background:white;

border-bottom:1px solid var(--border);

}



.logo{

font-size:28px;

font-weight:900;

color:var(--gold);

}



.back{

text-decoration:none;

background:var(--gold);

color:black;

padding:12px 25px;

border-radius:30px;

font-weight:bold;

}




.container{

padding:50px 20px;

display:flex;

justify-content:center;

}




.checkout{

background:white;

width:600px;

padding:35px;

border-radius:30px;

border:1px solid var(--border);

}





.summary{

background:#fff6d8;

padding:20px;

border-radius:20px;

margin-bottom:25px;

}



.price{

font-size:35px;

font-weight:900;

color:var(--gold);

}





input,textarea{

width:100%;

padding:15px;

margin:10px 0;

border-radius:12px;

border:1px solid var(--border);

font-size:15px;

}



textarea{

height:100px;

resize:none;

}





.qr{

width:220px;

height:220px;

background:#eee;

display:flex;

align-items:center;

justify-content:center;

margin:20px auto;

border-radius:20px;

color:#777;

}





.upload{

background:#fff6d8;

padding:20px;

border-radius:20px;

}



button{

width:100%;

padding:18px;

border:none;

border-radius:30px;

background:var(--gold);

font-weight:bold;

cursor:pointer;

font-size:16px;

}



.success{

display:none;

text-align:center;

padding:30px;

color:green;

font-weight:bold;

}



@media(max-width:600px){

header{

padding:0 20px;

}


.checkout{

width:100%;

}


}

</style>


</head>


<body>



<header>


<div class="logo">

PANKAZXX SHOP

</div>


<a href="products.html" class="back">

Back

</a>


</header>







<div class="container">


<div class="checkout">



<h1>

Complete Order

</h1>





<div class="summary">


<h3 id="product">

Product

</h3>


<p id="duration">

Duration

</p>


<div class="price" id="price">

₹0

</div>


</div>








<h2>

Customer Details

</h2>



<input id="name"
placeholder="Your Name">



<input id="email"
placeholder="Email Address">



<input id="phone"
placeholder="WhatsApp Number">







<h2>

Payment

</h2>



<p>

Send payment to the UPI ID below:

</p>



<h3>

yourupi@bank

</h3>





<div class="qr">

UPLOAD QR HERE

</div>





<div class="upload">


<label>

Payment Screenshot

</label>


<input 
type="file"
id="proof"
accept="image/*">



<img id="preview"
style="
width:100%;
margin-top:15px;
border-radius:15px;
display:none;
">


</div>





<br>



<button onclick="submitOrder()">

Submit Order

</button>





<div class="success" id="success">

✅ Order Submitted Successfully

<br>

We will verify your payment and deliver access.

</div>




</div>

</div>









<script>





let order = JSON.parse(

localStorage.getItem("orderProduct")

)

|| {};





document.getElementById("product")
.innerHTML =

order.product || "Product";



document.getElementById("duration")
.innerHTML =

order.duration || "";



document.getElementById("price")
.innerHTML =

"₹"+(order.price || 0);









let paymentImage="";





document.getElementById("proof")
.addEventListener(

"change",

function(){


let file=this.files[0];


if(file){


let reader=new FileReader();


reader.onload=function(e){


paymentImage=e.target.result;


document.getElementById("preview")
.src=e.target.result;


document.getElementById("preview")
.style.display="block";


}


reader.readAsDataURL(file);


}


}

);








function submitOrder(){



let newOrder={


id:Date.now(),


customer:

document.getElementById("name").value,


email:

document.getElementById("email").value,


phone:

document.getElementById("phone").value,


product:

order.product,


duration:

order.duration,


amount:

order.price,


payment:

paymentImage,


status:"pending"


};






let orders=

JSON.parse(

localStorage.getItem("orders")

)

|| [];



orders.push(newOrder);



localStorage.setItem(

"orders",

JSON.stringify(orders)

);





document.getElementById("success")
.style.display="block";


}





</script>



</body>

</html>
