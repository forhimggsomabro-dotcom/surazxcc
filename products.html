<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAZXX SHOP - Product</title>


<style>

:root{

--bg:#faf7ef;
--gold:#d8ad32;
--border:#eadbb8;
--text:#17130d;

}


*{

box-sizing:border-box;
font-family:Segoe UI,Arial;

}


body{

margin:0;
background:var(--bg);
color:var(--text);

}



header{

height:85px;

background:white;

border-bottom:1px solid var(--border);

display:flex;

align-items:center;

justify-content:space-between;

padding:0 50px;

}



.logo{

font-size:28px;
font-weight:900;
color:var(--gold);

}



.back{

background:var(--gold);
padding:12px 25px;
border-radius:30px;
text-decoration:none;
color:black;
font-weight:bold;

}



.container{

padding:50px 20px;

display:flex;

justify-content:center;

}



.card{

background:white;

width:500px;

padding:35px;

border-radius:30px;

border:1px solid var(--border);

}



.card img{

width:100px;

height:100px;

object-fit:cover;

border-radius:20px;

}



.category{

display:inline-block;

margin-top:20px;

padding:8px 15px;

background:#fff2c7;

border-radius:20px;

}



h1{

font-size:42px;

}



.desc{

color:#806f50;

}



.price{

font-size:45px;

font-weight:900;

color:var(--gold);

}




.duration{

display:flex;

gap:10px;

flex-wrap:wrap;

}



.duration button{

padding:12px 20px;

border-radius:25px;

border:1px solid var(--border);

background:white;

cursor:pointer;

}



.duration button:hover{

background:var(--gold);

}



.buy{

margin-top:25px;

width:100%;

padding:18px;

border:none;

border-radius:30px;

background:var(--gold);

font-weight:bold;

cursor:pointer;

}



.stock{

color:green;

font-weight:bold;

}



@media(max-width:600px){

header{

padding:0 20px;

}

.card{

width:100%;

}

}

</style>

</head>


<body>



<header>


<div class="logo">

PANKAZXX SHOP

</div>


<a class="back" href="products.html">

Products

</a>


</header>






<div class="container">


<div class="card">



<img id="image" src="logo.png">



<span class="category" id="category">

Loading...

</span>




<h1 id="name">

Loading...

</h1>



<p class="desc" id="description">

</p>




<div class="price" id="price">

₹0

</div>



<p class="stock" id="stock">

</p>




<h3>

Choose Plan

</h3>



<div class="duration">


<button onclick="selectPlan('30 Days')">

30 Days

</button>


<button onclick="selectPlan('90 Days')">

90 Days

</button>


<button onclick="selectPlan('180 Days')">

180 Days

</button>


</div>




<button class="buy" onclick="checkout()">

Continue To Checkout

</button>



</div>


</div>









<script type="module">


import { supabase } from "./supabase.js";



let product=null;

let selectedDuration="30 Days";






async function loadProduct(){



let params =
new URLSearchParams(
window.location.search
);



let name=params.get("name");



const {data,error}=await supabase

.from("products")

.select("*")

.eq("name",name)

.single();





if(error){

console.log(error);

document.getElementById("name")
.innerHTML=
"Product Not Found";

return;

}



product=data;



document.getElementById("name")
.innerHTML=
product.name;



document.getElementById("category")
.innerHTML=
product.category;



document.getElementById("description")
.innerHTML=
product.description;



document.getElementById("price")
.innerHTML=
"₹"+product.price;



document.getElementById("stock")
.innerHTML=
"✓ Stock Available: "
+
product.stock;



if(product.image){

document.getElementById("image")
.src=product.image;

}



}







window.selectPlan=function(plan){

selectedDuration=plan;

}







window.checkout=function(){



localStorage.setItem(

"selectedProduct",

JSON.stringify({

name:product.name,

price:product.price,

duration:selectedDuration

})

);



window.location.href="checkout.html";


}







loadProduct();



</script>



</body>

</html>
