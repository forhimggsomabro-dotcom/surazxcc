<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAZXX SHOP - Products</title>


<style>

:root{

--bg:#faf7ef;
--gold:#d8ad32;
--gold2:#f0ce65;
--text:#17130d;
--muted:#806f50;
--border:#eadbb8;
--card:#ffffff;

}


*{

box-sizing:border-box;
font-family:Segoe UI,Arial;

}


body{

margin:0;

background:var(--bg);

color:var(--text);

}


/* HEADER */

header{

height:90px;

display:flex;

align-items:center;

justify-content:space-between;

padding:15px 60px;

background:white;

border-bottom:1px solid var(--border);

position:sticky;

top:0;

z-index:10;

}



.logo{

font-size:25px;

font-weight:900;

color:var(--gold);

}



nav a{

margin-left:20px;

text-decoration:none;

color:#705b30;

font-weight:bold;

}



.btn{

background:var(--gold);

padding:12px 25px;

border-radius:30px;

color:black!important;

}



/* HERO */


.hero{

text-align:center;

padding:70px 20px;

}



.hero h1{

font-size:55px;

margin:0;

}



.hero span{

color:var(--gold);

}



.hero p{

color:var(--muted);

font-size:18px;

}





/* SEARCH */


.search{

text-align:center;

}



.search input{

width:350px;

max-width:90%;

padding:16px 20px;

border-radius:30px;

border:1px solid var(--border);

font-size:16px;

}





/* FILTER */


.filters{

display:flex;

justify-content:center;

gap:12px;

flex-wrap:wrap;

padding:30px;

}



.filters button{

background:white;

border:1px solid var(--border);

padding:12px 22px;

border-radius:30px;

cursor:pointer;

font-weight:bold;

}



.filters button:hover{

background:var(--gold);

}





/* PRODUCTS */


.products{

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(260px,1fr));

gap:25px;

padding:40px 60px;

}




.card{

background:white;

border:1px solid var(--border);

border-radius:25px;

padding:25px;

box-shadow:0 15px 30px rgba(0,0,0,.08);

}



.card img{

width:70px;

height:70px;

border-radius:15px;

object-fit:cover;

}



.category{

display:inline-block;

background:#fff4d5;

color:#a57b00;

padding:6px 12px;

border-radius:20px;

font-size:12px;

font-weight:bold;

}




.card h2{

margin-bottom:5px;

}



.desc{

color:var(--muted);

}



.price{

font-size:35px;

font-weight:900;

color:var(--gold);

}



button.buy{

width:100%;

padding:15px;

border:none;

border-radius:15px;

background:var(--gold);

font-weight:bold;

cursor:pointer;

}




button.buy:hover{

background:var(--gold2);

}



/* WHATSAPP */


.whatsapp{

position:fixed;

right:25px;

bottom:25px;

background:#25D366;

color:white;

height:60px;

width:60px;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:25px;

text-decoration:none;

}



footer{

background:#17130d;

color:white;

padding:30px;

text-align:center;

}




@media(max-width:700px){


header{

padding:15px 20px;

}


nav{

display:none;

}


.hero h1{

font-size:38px;

}


.products{

padding:20px;

}

}


</style>

</head>


<body>



<header>


<div class="logo">

PANKAZXX SHOP

</div>



<nav>


<a href="index.html">
Home
</a>


<a href="products.html">
Products
</a>


<a href="admin.html">
Admin
</a>


<a class="btn"
href="checkout.html">

Order

</a>


</nav>


</header>






<section class="hero">


<h1>

Premium <span>Digital Products</span>

</h1>


<p>

Choose your subscription and get instant access.

</p>


</section>








<div class="search">


<input
id="search"
placeholder="Search products..."
onkeyup="searchProducts()">


</div>






<div class="filters">


<button onclick="filterProducts('All')">

All

</button>


<button onclick="filterProducts('AI')">

AI

</button>


<button onclick="filterProducts('Streaming')">

Streaming

</button>


<button onclick="filterProducts('Gaming')">

Gaming

</button>


<button onclick="filterProducts('Design')">

Design

</button>


</div>







<div class="products" id="products">


</div>






<footer>

PANKAZXX SHOP
<br>
Premium Access. Best Prices.

</footer>







<a class="whatsapp"
href="https://wa.me/"
target="_blank">

☎

</a>








<script>



let products=[


{

name:"ChatGPT Plus",

category:"AI",

price:"$10",

description:"Premium AI assistant access",

image:"logo.png"

},



{

name:"Netflix Premium",

category:"Streaming",

price:"$3",

description:"4K streaming subscription",

image:"logo.png"

},



{

name:"Spotify Premium",

category:"Music",

price:"$7",

description:"Ad-free music experience",

image:"logo.png"

},



{

name:"Canva Pro",

category:"Design",

price:"$5",

description:"Premium design tools",

image:"logo.png"

}


];





let current=products;





function showProducts(data){


let box=document.getElementById("products");


box.innerHTML="";



data.forEach(p=>{


box.innerHTML+=`


<div class="card">


<img src="${p.image}">


<br><br>


<span class="category">

${p.category}

</span>


<h2>

${p.name}

</h2>


<p class="desc">

${p.description}

</p>


<div class="price">

${p.price}

</div>



<br>


<button class="buy"
onclick="buy('${p.name}')">

View Plans

</button>


</div>


`;


});


}





function filterProducts(cat){


if(cat=="All"){

current=products;

}

else{

current=products.filter(

p=>p.category==cat

);

}


showProducts(current);


}







function searchProducts(){


let value=

document.getElementById("search")
.value
.toLowerCase();



let result=current.filter(

p=>

p.name.toLowerCase()
.includes(value)

);



showProducts(result);


}





function buy(product){


window.location.href=

"product.html?name="+product;


}






showProducts(products);



</script>


</body>

</html>
