<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAZXX Admin Login</title>


<style>

:root{

--bg:#faf7ef;
--gold:#d8ad32;
--gold2:#f0ce65;
--dark:#17130d;
--border:#eadbb8;

}


*{

box-sizing:border-box;
font-family:Segoe UI,Arial;

}


body{

margin:0;

height:100vh;

display:flex;

align-items:center;

justify-content:center;

background:

radial-gradient(circle at top,#f7e7b2,transparent 40%),

var(--bg);

}




.login{

background:white;

width:380px;

padding:40px;

border-radius:25px;

border:1px solid var(--border);

box-shadow:0 20px 50px rgba(0,0,0,.15);

text-align:center;

}




.logo{

font-size:32px;

font-weight:900;

color:var(--gold);

margin-bottom:10px;

}



.subtitle{

color:#806f50;

margin-bottom:30px;

}




input{

width:100%;

padding:15px;

margin:10px 0;

border-radius:12px;

border:1px solid var(--border);

font-size:16px;

}




button{

width:100%;

padding:16px;

border:none;

border-radius:30px;

background:

linear-gradient(
90deg,
var(--gold),
var(--gold2)
);

font-weight:bold;

cursor:pointer;

font-size:16px;

}



.error{

color:red;

margin-top:15px;

display:none;

}



.back{

margin-top:20px;

display:block;

text-decoration:none;

color:#806f50;

}



@media(max-width:500px){

.login{

width:90%;

}

}


</style>

</head>



<body>



<div class="login">


<div class="logo">

PANKAZXX

</div>


<h2>

Admin Panel

</h2>


<p class="subtitle">

Manage your digital store

</p>




<input

id="email"

placeholder="Admin Email"

type="email"

>



<input

id="password"

placeholder="Password"

type="password"

>




<button onclick="login()">

Login

</button>



<p class="error" id="error">

Invalid Login

</p>



<a class="back" href="https://your-store-url.com">

← Back to Store

</a>


</div>






<script>


// Temporary login
// Replace with backend API later


function login(){


let email=
document.getElementById("email").value;


let password=
document.getElementById("password").value;



// Demo credentials

if(
email==="admin@pankazxx.com"
&&
password==="admin123"
)

{


localStorage.setItem(
"adminLogin",
"true"
);



window.location.href="dashboard.html";


}

else{


document.getElementById("error")
.style.display="block";


}


}


</script>



</body>

</html>
