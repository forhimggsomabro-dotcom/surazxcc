<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAZXX Admin Dashboard</title>


<style>

:root{
--bg:#faf7ef;
--card:#ffffff;
--gold:#d8ad32;
--gold2:#f0ce65;
--text:#17130d;
--muted:#806f50;
--border:#eadbb8;
}


*{
box-sizing:border-box;
font-family:Segoe UI,Arial,sans-serif;
}


body{

margin:0;

background:var(--bg);

color:var(--text);

}



/* HEADER */


header{

height:85px;

background:white;

border-bottom:1px solid var(--border);

display:flex;

align-items:center;

justify-content:space-between;

padding:0 40px;

position:sticky;

top:0;

}



.logo{

font-size:28px;

font-weight:900;

color:var(--gold);

}



.logout{

background:#17130d;

color:white;

border:none;

padding:12px 25px;

border-radius:30px;

cursor:pointer;

font-weight:bold;

}



/* CONTAINER */


.container{

padding:40px;

}




/* NAV */


.nav{

display:flex;

gap:15px;

flex-wrap:wrap;

margin-bottom:35px;

}



.nav a{

text-decoration:none;

background:white;

border:1px solid var(--border);

padding:14px 25px;

border-radius:30px;

color:var(--muted);

font-weight:bold;

}



.nav a:hover{

background:var(--gold);

color:black;

}





/* STATS */


.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:25px;

}



.card{

background:white;

padding:30px;

border-radius:25px;

border:1px solid var(--border);

}



.card h3{

color:var(--muted);

margin-top:0;

}



.number{

font-size:42px;

font-weight:900;

color:var(--gold);

}





/* ACTIONS */


.actions{

margin-top:40px;

background:white;

padding:30px;

border-radius:25px;

border:1px solid var(--border);

}



.actions button{

padding:15px 25px;

margin:8px;

border:none;

border-radius:30px;

background:var(--gold);

font-weight:bold;

cursor:pointer;

}





footer{

text-align:center;

padding:30px;

color:var(--muted);

}





@media(max-width:600px){

header{

padding:0 20px;

}


.container{

padding:20px;

}

.logo{

font-size:22px;

}

}



</style>

</head>


<body>




<header>


<div class="logo">

PANKAZXX ADMIN

</div>


<button class="logout" onclick="logout()">

Logout

</button>


</header>







<div class="container">



<div class="nav">


<a href="dashboard.html">

Dashboard

</a>


<a href="admin-products.html">

Products

</a>


<a href="admin-orders.html">

Orders

</a>


<a href="admin-settings.html">

Settings

</a>


</div>








<div class="stats">



<div class="card">

<h3>

Products

</h3>


<div class="number" id="productCount">

0

</div>


</div>





<div class="card">

<h3>

Orders

</h3>


<div class="number" id="orderCount">

0

</div>


</div>





<div class="card">

<h3>

Revenue

</h3>


<div class="number">

₹0

</div>


</div>





<div class="card">

<h3>

Customers

</h3>


<div class="number">

0

</div>


</div>



</div>









<div class="actions">


<h2>

Quick Actions

</h2>



<button onclick="location.href='admin-products.html'">

+ Add Product

</button>



<button onclick="location.href='admin-orders.html'">

View Orders

</button>



<button onclick="location.href='admin-settings.html'">

Edit Website

</button>



</div>







</div>






<footer>

PANKAZXX SHOP ADMIN PANEL

</footer>








<script>


// Login protection

if(localStorage.getItem("adminLogin") !== "true"){

window.location.href="admin.html";

}




function logout(){


localStorage.removeItem("adminLogin");


window.location.href="admin.html";


}




// Demo counters
// Later connect backend/database


let products =

JSON.parse(
localStorage.getItem("products")
)
|| [];


let orders =

JSON.parse(
localStorage.getItem("orders")
)
|| [];



document.getElementById("productCount")
.innerHTML =
products.length;



document.getElementById("orderCount")
.innerHTML =
orders.length;



</script>



</body>

</html>
