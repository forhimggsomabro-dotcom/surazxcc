<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAZXX Admin Dashboard</title>


<style>

:root{

--bg:#faf7ef;
--card:#ffffff;
--gold:#d8ad32;
--gold2:#f0ce65;
--text:#17130d;
--muted:#806f50;
--border:#eadbb8;

}


*{

box-sizing:border-box;
font-family:Segoe UI,Arial;

}



body{

margin:0;

background:var(--bg);

color:var(--text);

}



/* HEADER */

header{

height:80px;

background:white;

border-bottom:1px solid var(--border);

display:flex;

align-items:center;

justify-content:space-between;

padding:0 40px;

position:sticky;

top:0;

}



.logo{

font-size:28px;

font-weight:900;

color:var(--gold);

}



.logout{

background:#17130d;

color:white;

padding:12px 25px;

border-radius:30px;

cursor:pointer;

border:none;

}





/* LAYOUT */


.container{

padding:40px;

}




.menu{

display:flex;

gap:15px;

flex-wrap:wrap;

margin-bottom:30px;

}



.menu a{

text-decoration:none;

background:white;

padding:15px 25px;

border-radius:20px;

border:1px solid var(--border);

color:#806f50;

font-weight:bold;

}



.menu a:hover{

background:var(--gold);

color:black;

}




/* STATS */


.stats{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:25px;

}



.stat{

background:white;

padding:30px;

border-radius:25px;

border:1px solid var(--border);

}



.stat h3{

color:var(--muted);

}



.number{

font-size:40px;

font-weight:900;

color:var(--gold);

}




/* QUICK */


.quick{

margin-top:40px;

background:white;

padding:30px;

border-radius:25px;

border:1px solid var(--border);

}



.quick button{

padding:15px 25px;

border:none;

border-radius:25px;

margin:10px;

background:var(--gold);

font-weight:bold;

cursor:pointer;

}




footer{

text-align:center;

padding:30px;

color:var(--muted);

}




@media(max-width:600px){

.container{

padding:20px;

}


header{

padding:0 20px;

}

}


</style>


</head>


<body>




<header>


<div class="logo">

PANKAZXX ADMIN

</div>


<button class="logout" onclick="logout()">

Logout

</button>


</header>







<div class="container">





<div class="menu">


<a href="dashboard.html">
Dashboard
</a>


<a href="products.html">
Products
</a>


<a href="orders.html">
Orders
</a>


<a href="settings.html">
Settings
</a>


</div>








<div class="stats">



<div class="stat">

<h3>

Total Products

</h3>


<div class="number" id="products">

0

</div>


</div>




<div class="stat">

<h3>

Total Orders

</h3>


<div class="number" id="orders">

0

</div>


</div>




<div class="stat">

<h3>

Revenue

</h3>


<div class="number">

₹0

</div>


</div>




<div class="stat">

<h3>

Customers

</h3>


<div class="number">

0

</div>


</div>



</div>









<div class="quick">


<h2>

Quick Actions

</h2>


<button onclick="location.href='products.html'">

+ Add Product

</button>



<button onclick="location.href='orders.html'">

View Orders

</button>



<button onclick="location.href='settings.html'">

Edit Website

</button>


</div>





</div>






<footer>

PANKAZXX SHOP ADMIN PANEL

</footer>








<script>


// Check login

if(
localStorage.getItem("adminLogin")
!=="true"
)

{

window.location.href="login.html";

}




function logout(){


localStorage.removeItem(
"adminLogin"
);


window.location.href="login.html";


}





// Temporary data
// Later replaced by database


let products = 
JSON.parse(
localStorage.getItem("products")
)
||
[];


document.getElementById("products")
.innerHTML =
products.length;



</script>



</body>

</html>
