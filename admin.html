<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>


<style>

:root{

--bg:#080716;
--panel:#14122b;
--violet:#7c5cff;
--pink:#ff4fd8;
--cyan:#3ee6e0;

}


*{

box-sizing:border-box;
font-family:"Segoe UI",Arial;

}



body{

margin:0;

background:
radial-gradient(circle at top,#29145e,transparent 40%),
var(--bg);

color:white;

}



/* HEADER */

header{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px;

background:#14122bee;

position:sticky;

top:0;

}



.logo{

font-size:25px;

font-weight:900;

background:
linear-gradient(90deg,var(--violet),var(--pink),var(--cyan));

-webkit-background-clip:text;

color:transparent;

}




.container{

padding:25px;

}



.card{

background:var(--panel);

padding:25px;

border-radius:20px;

margin-bottom:25px;

box-shadow:0 20px 40px black;

}



h2{

color:var(--cyan);

}



input,textarea{

width:100%;

padding:14px;

margin:10px 0;

border-radius:10px;

border:none;

outline:none;

}



button{

padding:12px 20px;

border:none;

border-radius:10px;

background:
linear-gradient(
90deg,
var(--violet),
var(--pink)
);

color:white;

font-weight:bold;

cursor:pointer;

}



.products{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));

gap:20px;

}



.product{

background:#0e0d20;

padding:20px;

border-radius:15px;

}



.delete{

background:#ff3b5c;

}


.edit{

background:#00b894;

}



@media(max-width:600px){

.container{

padding:15px;

}

}



</style>


</head>



<body>



<header>


<div class="logo">

Admin Panel

</div>


<div>

Digital Store

</div>


</header>






<div class="container">





<div class="card">


<h2>

Homepage Settings

</h2>



<input 
id="title"
placeholder="Homepage Title"
value="Premium Digital Subscriptions">



<textarea 
id="description">

Get premium digital services with fast delivery.

</textarea>



<input 
id="telegram"
placeholder="Telegram ID"
value="@PANKAZXX_support">



<button onclick="saveHome()">

Save Homepage

</button>


</div>








<div class="card">


<h2>

Theme Settings

</h2>



<label>

Main Color

</label>


<input 
type="color"
id="color"
value="#7c5cff">



<button onclick="saveTheme()">

Save Theme

</button>


</div>










<div class="card">


<h2>

Add Product

</h2>



<input id="pname"
placeholder="Product Name">


<input id="price"
placeholder="Price">



<input id="stock"
placeholder="Stock">



<input id="duration"
placeholder="Duration">


<textarea id="desc"
placeholder="Description">
</textarea>



<button onclick="addProduct()">

Add Product

</button>


</div>








<div class="card">


<h2>

Manage Products

</h2>



<div class="products" id="productList">


</div>


</div>





</div>









<script>





let products = JSON.parse(
localStorage.getItem("products")
)
||
[];






function addProduct(){



let product={


id:Date.now(),


name:
document.getElementById("pname").value,


price:
document.getElementById("price").value,


stock:
document.getElementById("stock").value,


duration:
document.getElementById("duration").value,


description:
document.getElementById("desc").value



};



products.push(product);



saveProducts();



alert("Product Added");



}





function deleteProduct(id){


products =
products.filter(
p=>p.id!==id
);


saveProducts();


}







function saveProducts(){


localStorage.setItem(

"products",

JSON.stringify(products)

);


loadProducts();


}





function loadProducts(){


let box =
document.getElementById("productList");


box.innerHTML="";



products.forEach(p=>{


box.innerHTML+=`


<div class="product">


<h3>

${p.name}

</h3>


<p>

₹${p.price}

</p>


<p>

Stock:
${p.stock}

</p>


<p>

${p.duration}

</p>



<button class="delete"
onclick="deleteProduct(${p.id})">

Delete

</button>


</div>


`;


});


}









function saveHome(){


let data={


title:
document.getElementById("title").value,


description:
document.getElementById("description").value,


telegram:
document.getElementById("telegram").value



};



localStorage.setItem(

"homepage",

JSON.stringify(data)

);



alert("Homepage Updated");


}







function saveTheme(){


let color=
document.getElementById("color").value;


localStorage.setItem(
"theme",
color
);


alert("Theme Saved");


}







loadProducts();






/*

FIREBASE CONNECTION PLACE

Replace localStorage with:

Firebase Firestore

collections:

settings
products
orders


*/




</script>




</body>

</html>
