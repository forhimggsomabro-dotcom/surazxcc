<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PANKAZXX SHOP - Product</title>


<style>

:root{

--bg:#faf7ef;
--gold:#d8ad32;
--gold2:#f0ce65;
--border:#eadbb8;
--text:#17130d;

}


*{
box-sizing:border-box;
font-family:Segoe UI,Arial;
}


body{

margin:0;

background:var(--bg);

color:var(--text);

}



/* HEADER */

header{

height:85px;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 60px;

background:white;

border-bottom:1px solid var(--border);

}



.logo{

font-size:28px;

font-weight:900;

color:var(--gold);

}



.back{

text-decoration:none;

background:var(--gold);

color:black;

padding:12px 25px;

border-radius:30px;

font-weight:bold;

}



/* PRODUCT */

.container{

padding:60px;

display:flex;

justify-content:center;

}



.product{

background:white;

border:1px solid var(--border);

border-radius:30px;

padding:40px;

width:500px;

box-shadow:0 20px 40px rgba(0,0,0,.1);

}



.product img{

width:100px;

height:100px;

border-radius:20px;

object-fit:cover;

}



.category{

display:inline-block;

margin-top:20px;

padding:8px 18px;

background:#fff2c7;

border-radius:20px;

color:#9b7500;

font-weight:bold;

}



h1{

font-size:45px;

margin-bottom:10px;

}



.description{

color:#806f50;

font-size:18px;

}



.plans{

display:flex;

gap:15px;

flex-wrap:wrap;

margin-top:25px;

}



.plan{

padding:15px 25px;

border:1px solid var(--border);

border-radius:20px;

cursor:pointer;

background:white;

font-weight:bold;

}



.plan:hover{

background:var(--gold);

}





.price{

font-size:45px;

font-weight:900;

color:var(--gold);

margin:25px 0;

}





button{

width:100%;

padding:18px;

border:none;

border-radius:30px;

background:var(--gold);

font-weight:bold;

font-size:16px;

cursor:pointer;

}





.stock{

color:green;

font-weight:bold;

}




@media(max-width:600px){

.container{

padding:25px;

}


.product{

width:100%;

}


header{

padding:0 20px;

}


h1{

font-size:35px;

}

}


</style>

</head>


<body>



<header>


<div class="logo">

PANKAZXX SHOP

</div>


<a class="back" href="products.html">

Products

</a>


</header>








<div class="container">


<div class="product">


<img src="logo.png">



<div class="category" id="category">

AI

</div>




<h1 id="name">

Loading...

</h1>




<p class="description" id="description">

</p>




<h3>

Choose Duration

</h3>



<div class="plans">


<div class="plan" onclick="selectPlan('1 Month',10)">

1 Month

</div>



<div class="plan" onclick="selectPlan('3 Months',25)">

3 Months

</div>



<div class="plan" onclick="selectPlan('6 Months',45)">

6 Months

</div>


</div>





<div class="price" id="price">

$10

</div>



<p class="stock">

✓ Available Stock

</p>



<button onclick="orderNow()">

Order Now

</button>



</div>


</div>









<script>



let products=[


{

name:"ChatGPT Plus",

category:"AI",

price:10,

description:"Premium AI assistant access"

},


{

name:"Netflix Premium",

category:"Streaming",

price:3,

description:"4K entertainment access"

},


{

name:"Spotify Premium",

category:"Music",

price:7,

description:"Ad free music"

},


{

name:"Canva Pro",

category:"Design",

price:5,

description:"Premium design tools"

}


];






let params =
new URLSearchParams(
window.location.search
);



let productName =
params.get("name");



let selectedProduct =
products.find(

p=>p.name==productName

);





if(selectedProduct){


document.getElementById("name")
.innerHTML=
selectedProduct.name;


document.getElementById("category")
.innerHTML=
selectedProduct.category;


document.getElementById("description")
.innerHTML=
selectedProduct.description;


document.getElementById("price")
.innerHTML=
"$"+selectedProduct.price;


}





let selectedDuration="1 Month";

let selectedPrice=10;





function selectPlan(duration,price){


selectedDuration=duration;

selectedPrice=price;


document.getElementById("price")
.innerHTML=
"$"+price;


}






function orderNow(){


localStorage.setItem(

"orderProduct",

JSON.stringify({

product:selectedProduct.name,

duration:selectedDuration,

price:selectedPrice

})

);



window.location.href="checkout.html";


}



</script>


</body>

</html>
